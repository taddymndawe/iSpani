<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#2B57DC" />
<title>Dashboard — iSpani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  .dash-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--grey-bg);}
  .dash-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);
    padding:40px 36px;max-width:420px;width:100%;text-align:center;}
  .dash-card .dash-mark{width:56px;height:56px;border-radius:50%;background:var(--blue-50);color:var(--blue);
    display:grid;place-items:center;margin:0 auto 18px;}
  .dash-card .dash-mark svg{width:28px;height:28px;}
  .dash-card h1{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin-bottom:8px;}
  .dash-card .dash-email{color:var(--ink-soft);font-size:.95rem;margin-bottom:26px;word-break:break-all;}
  .dash-card .dash-email strong{color:var(--ink);}
</style>
</head>
<body>

<a class="brand" href="index.html" aria-label="iSpani home" style="position:absolute;top:24px;left:24px;color:var(--ink);">
  <span class="dot"><span class="dot-bg"></span><span class="dot-txt">iS</span></span>
  <span class="brand-name" style="color:var(--ink)">iSpani</span>
</a>

<main class="dash-wrap" id="dashboardPage">
  <div class="dash-card">
    <div class="dash-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h1>Welcome back</h1>
    <p class="dash-email">Signed in as <strong id="dashEmail">…</strong></p>
    <button class="btn btn-outline btn-block btn-lg" onclick="signOut()">Log out</button>
  </div>
</main>

<script src="js/app.js"></script>
<script type="module" src="js/firebase-config.js"></script>
</body>
</html>
